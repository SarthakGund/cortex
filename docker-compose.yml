version: '3.8'

services:
  # Graph Database for the Living Knowledge Graph
  neo4j:
    image: neo4j:5.15.0
    container_name: spit_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # Vector Database for Semantic Search & Q&A
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: spit_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Relational Database for Users, Metadata, and App State
  postgres:
    image: postgres:16-alpine
    container_name: spit_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=spit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for Task Queues (Ingestion Workers)
  redis:
    image: redis:7-alpine
    container_name: spit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
  redis_data:
