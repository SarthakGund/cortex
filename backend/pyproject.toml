[project]
name = "spit-backend"
version = "0.1.0"
description = "SPIT - Intelligent Architecture & Knowledge Platform backend API"
requires-python = ">=3.10,<3.13"

dependencies = [
  "fastapi==0.109.2",
  "uvicorn==0.27.1",
  "pydantic==2.6.1",
  "pydantic-settings==2.1.0",
  "neo4j==5.17.0",
  "qdrant-client==1.7.3",
  "langchain==0.1.5",
  "langchain-openai==0.0.5",
  "sqlalchemy==2.0.25",
  "psycopg2-binary==2.9.9",
  "celery==5.3.6",
  "redis==5.0.1",
  "python-dotenv==1.0.1",
  "tree-sitter-python>=0.25.0",
  "tree-sitter>=0.25.2",
  "tree-sitter-typescript>=0.23.2",
  "tree-sitter-javascript>=0.25.0",
]

[tool.uv]
# uv will create a .venv directory by default; run `uv sync` to install deps.
