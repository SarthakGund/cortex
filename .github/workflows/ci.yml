name: CI
# if someone opens a PR or pushes to main, GitHub Actions runs the CI jobs (backend checks, frontend checks, Docker builds
# the images are built on the GitHub runner and stored only on that runner’s local disk.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test + docker build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Lint — ruff
        run: uv run ruff check .

      - name: Type check — mypy
        run: uv run mypy . --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        env:
          GITHUB_CLIENT_ID: ci_test_id
          GITHUB_CLIENT_SECRET: ci_test_secret
          GROQ_API_KEY: ci_test_groq_key
          NEO4J_PASSWORD: strong_ci_password
          DATABASE_URL: "sqlite:///:memory:"
          WEBHOOK_SECRET: ci_test_webhook_secret
        run: uv run pytest tests/ -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + docker build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint || true

      - name: Type check — tsc
        run: npx tsc --noEmit

  # ── Docker builds ─────────────────────────────────────────────────────────────
  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t spit-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://api.example.com \
            -t spit-frontend:ci ./frontend
